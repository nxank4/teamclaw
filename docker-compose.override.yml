# Development overrides — applied automatically with `docker compose up`
services:
  openpawl:
    build:
      target: builder
    volumes:
      - .:/app
      - /app/node_modules
      - openpawl-data:/home/node/.openpawl
    environment:
      - NODE_ENV=development
      - OPENPAWL_MOCK_LLM=true
    command: ["node", "/app/dist/cli.js", "web", "-p", "8000"]
