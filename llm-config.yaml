# TeamClaw LiteLLM Gateway – single config for TeamClaw + OpenClaw.
# Run: teamclaw gateway start  (or docker compose --profile gateway up)
# Then set GATEWAY_URL=http://localhost:4000 and TEAM_MODEL=team-default (or another model_name below).

model_list:
  - model_name: team-default
    litellm_params:
      model: ollama/qwen3.5:2b
      api_base: http://localhost:11434

  # Optional cloud models (uncomment and set env vars):
