# TeamClaw Docker Compose
# Quick start:
#   cp .env.example .env        # add your API key
#   docker compose up -d        # start dashboard
#   open http://localhost:8000

services:
  teamclaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: teamclaw:latest
    container_name: teamclaw
    ports:
      - "${TEAMCLAW_PORT:-8000}:8000"
    volumes:
      - teamclaw-data:/home/node/.teamclaw
      - ${WORKSPACE_PATH:-./workspace}:/workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TEAMCLAW_MOCK_LLM=${TEAMCLAW_MOCK_LLM:-false}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  teamclaw-data:
    driver: local
