<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (localStorage.getItem('openpawl-theme') === 'dark' || (!('openpawl-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      var p = localStorage.getItem('openpawl-palette');
      if (p && p !== 'default') document.documentElement.dataset.palette = p;
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenPawl</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
